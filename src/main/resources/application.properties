spring.application.name=dungeon-tracker-backend

# Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/mydatabase
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CORS Configuration
app.cors.allowed-origin=${ALLOWED_FRONTEND_ORIGIN:http://localhost:5173}

# A secure, random string used to sign JWTs (Keep this secret!)
app.jwt.secret=${JWT_SECRET_KEY:dungeon-master-ultra-secret-key-change-this-in-production-123456!}
# Token expiration time (e.g., 86400000 ms = 24 hours)
app.jwt.expiration-ms=86400000